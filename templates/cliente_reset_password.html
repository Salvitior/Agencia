<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='imagenes/logosintexto.png') }}">
    <title>Nueva Contraseña - Viatges Carcaixent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style/style.css') }}">
    <style>
        .auth-container { max-width: 440px; margin: 100px auto; padding: 40px; background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
        .auth-container h1 { font-size: 1.6rem; margin-bottom: 8px; color: #1a1a2e; }
        .auth-container p.subtitle { color: #666; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; color: #333; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1.5px solid #ddd; border-radius: 10px; font-size: 1rem; box-sizing: border-box; }
        .form-group input:focus { border-color: #e67e22; outline: none; }
        .btn-auth { width: 100%; padding: 14px; background: linear-gradient(135deg, #e67e22, #d35400); color: #fff; border: none; border-radius: 10px; font-size: 1.05rem; font-weight: 700; cursor: pointer; }
        .alert { padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 0.9rem; }
        .alert-error { background: #fdf0ed; color: #c0392b; }
        .alert-success { background: #edf7ed; color: #27ae60; }
    </style>
</head>
<body style="background: #f5f6fa; min-height: 100vh;">
    <header class="main-header" id="top">
        <div class="logo-container">
            <a href="{{ url_for('home') }}">
                <img src="{{ url_for('static', filename='imagenes/logo.png') }}" alt="Viatges Carcaixent" class="logo-premium">
            </a>
        </div>
    </header>

    <div class="auth-container">
        <h1>Nueva Contraseña</h1>
        <p class="subtitle">Introduce tu nueva contraseña.</p>

        <div id="alert-box" style="display:none;"></div>

        <form id="reset-form">
            <div class="form-group">
                <label for="password">Nueva contraseña</label>
                <input type="password" id="password" name="password" required placeholder="Mínimo 8 caracteres" minlength="8">
            </div>
            <div class="form-group">
                <label for="password2">Repetir contraseña</label>
                <input type="password" id="password2" name="password2" required placeholder="Repite la contraseña">
            </div>
            <button type="submit" class="btn-auth">Cambiar contraseña</button>
        </form>
    </div>

    <script>
    document.getElementById('reset-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const pw = document.getElementById('password').value;
        const pw2 = document.getElementById('password2').value;
        const alertBox = document.getElementById('alert-box');

        if (pw !== pw2) {
            alertBox.className = 'alert alert-error';
            alertBox.textContent = 'Las contraseñas no coinciden.';
            alertBox.style.display = 'block';
            return;
        }

        try {
            const r = await fetch('{{ url_for("clientes.reset_password", token=token) }}', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ password: pw })
            });
            const data = await r.json();

            if (data.success) {
                alertBox.className = 'alert alert-success';
                alertBox.textContent = 'Contraseña actualizada correctamente. Redirigiendo...';
                alertBox.style.display = 'block';
                setTimeout(() => window.location.href = '{{ url_for("clientes.login") }}', 2000);
            } else {
                alertBox.className = 'alert alert-error';
                alertBox.textContent = data.error || 'Error al cambiar la contraseña.';
                alertBox.style.display = 'block';
            }
        } catch(err) {
            alertBox.className = 'alert alert-error';
            alertBox.textContent = 'Error de conexión.';
            alertBox.style.display = 'block';
        }
    });
    </script>
</body>
</html>
