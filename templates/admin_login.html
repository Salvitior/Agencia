<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso — Viatges Carcaixent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117; --surface: #181c27; --border: #2a2f42;
      --text: #e8eaf0; --text2: #8a93b2; --text3: #555e7a;
      --accent: #4f7cff; --red: #ef4444; --font: 'DM Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

    /* subtle grid background */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px; opacity: .35;
    }

    .login-wrap { position: relative; z-index: 1; width: 100%; max-width: 380px; }

    .login-logo {
      display: flex; align-items: center; gap: 10px;
      justify-content: center; margin-bottom: 32px;
    }
    .login-logo-icon {
      width: 40px; height: 40px; background: var(--accent);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
    }
    .login-logo-text { font-size: 17px; font-weight: 700; }
    .login-logo-sub  { font-size: 12px; color: var(--text3); margin-top: 1px; }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 8px 48px rgba(0,0,0,.5);
      animation: up .3s ease;
    }
    @keyframes up { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:none; } }

    .login-card h1 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .login-card p  { font-size: 13px; color: var(--text2); margin-bottom: 24px; }

    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .form-label { font-size: 12px; font-weight: 500; color: var(--text2); }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--text3); pointer-events: none;
    }
    .form-control {
      width: 100%; padding: 10px 12px 10px 38px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-size: 13px; font-family: var(--font);
      outline: none; transition: border-color .15s, box-shadow .15s;
    }
    .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,124,255,.15); }
    .form-control::placeholder { color: var(--text3); }

    .btn-login {
      width: 100%; margin-top: 8px; padding: 11px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600; font-family: var(--font);
      cursor: pointer; transition: background .15s, transform .1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover { background: #6b94ff; }
    .btn-login:active { transform: scale(.98); }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; }

    .alert {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px;
    }
    .alert-error { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.25); color: #f87171; }

    .spinner {
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <div class="login-logo-icon">
        <svg width="22" height="22" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <div>
        <div class="login-logo-text">Viatges Carcaixent</div>
        <div class="login-logo-sub">Panel de administración</div>
      </div>
    </div>

    <div class="login-card">
      <h1>Bienvenido</h1>
      <p>Introduce tus credenciales para acceder</p>

      {% if error %}
      <div class="alert alert-error">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" id="loginForm">
        <div class="form-group">
          <label class="form-label">Usuario</label>
          <div class="input-wrap">
            <span class="input-icon"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
            <input class="form-control" type="text" name="username" placeholder="admin" required autofocus>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <div class="input-wrap">
            <span class="input-icon"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></span>
            <input class="form-control" type="password" name="password" placeholder="••••••••" required id="pwInput">
          </div>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <span class="spinner" id="spinner"></span>
          <span id="btnText">Iniciar sesión</span>
          <svg id="btnArrow" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const btn  = document.getElementById('loginBtn');
    const spin = document.getElementById('spinner');
    const txt  = document.getElementById('btnText');
    const arr  = document.getElementById('btnArrow');

    form.addEventListener('submit', async e => {
      e.preventDefault();
      btn.disabled = true; spin.style.display = 'block'; arr.style.display = 'none';
      txt.textContent = 'Verificando…';

      try {
        const r = await fetch('/admin/login', { method: 'POST', body: new FormData(form) });
        if (r.ok) { window.location.href = '/admin/dashboard'; return; }
        // show error inline without reload
        let errDiv = document.querySelector('.alert-error');
        if (!errDiv) {
          errDiv = document.createElement('div');
          errDiv.className = 'alert alert-error';
          errDiv.innerHTML = `<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span>Credenciales incorrectas</span>`;
          form.parentNode.insertBefore(errDiv, form);
        }
      } catch(e) { /* network error */ }

      btn.disabled = false; spin.style.display = 'none'; arr.style.display = '';
      txt.textContent = 'Iniciar sesión';
      document.getElementById('pwInput').value = '';
    });
  </script>
</body>
</html>
