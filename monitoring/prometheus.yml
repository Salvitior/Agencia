# Configuracion de Prometheus

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "agencia-viajes"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "flask-app"
    metrics_path: "/metrics"
    scrape_interval: 10s
    static_configs:
      - targets: ["host.docker.internal:8000"]
