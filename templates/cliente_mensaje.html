<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='imagenes/logosintexto.png') }}">
    <title>{{ titulo }} - Viatges Carcaixent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style/style.css') }}">
    <style>
        .msg-container { max-width: 500px; margin: 100px auto; padding: 40px; background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; }
        .msg-container h1 { font-size: 1.8rem; margin-bottom: 16px; color: #1a1a2e; }
        .msg-container p { color: #555; line-height: 1.7; margin-bottom: 24px; }
        .btn-auth { display: inline-block; padding: 12px 32px; background: linear-gradient(135deg, #e67e22, #d35400); color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body style="background: #f5f6fa; min-height: 100vh;">
    <header class="main-header" id="top">
        <div class="logo-container">
            <a href="{{ url_for('home') }}">
                <img src="{{ url_for('static', filename='imagenes/logo.png') }}" alt="Viatges Carcaixent" class="logo-premium">
            </a>
        </div>
    </header>

    <div class="msg-container">
        <h1>{{ titulo }}</h1>
        <p>{{ mensaje }}</p>
        <a href="{{ url_for('clientes.login') }}" class="btn-auth">Iniciar Sesión</a>
    </div>
</body>
</html>
