<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='imagenes/logosintexto.png') }}">
    <title>Iniciar Sesión - Viatges Carcaixent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style/style.css') }}">
    <style>
        .auth-container { max-width: 440px; margin: 80px auto; padding: 40px; background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
        .auth-container h1 { font-size: 1.8rem; margin-bottom: 8px; color: #1a1a2e; }
        .auth-container p.subtitle { color: #666; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; color: #333; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1.5px solid #ddd; border-radius: 10px; font-size: 1rem; transition: border-color 0.2s; box-sizing: border-box; }
        .form-group input:focus { border-color: #e67e22; outline: none; box-shadow: 0 0 0 3px rgba(230,126,34,0.1); }
        .btn-auth { width: 100%; padding: 14px; background: linear-gradient(135deg, #e67e22, #d35400); color: #fff; border: none; border-radius: 10px; font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: transform 0.1s; }
        .btn-auth:hover { transform: translateY(-1px); }
        .auth-links { margin-top: 20px; text-align: center; font-size: 0.9rem; }
        .auth-links a { color: #e67e22; text-decoration: none; font-weight: 600; }
        .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem; }
        .alert-error { background: #fdf0ed; color: #c0392b; border: 1px solid #f5c6cb; }
        .alert-success { background: #edf7ed; color: #27ae60; border: 1px solid #c3e6cb; }
        .divider { display: flex; align-items: center; margin: 24px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #eee; }
        .divider span { padding: 0 12px; color: #999; font-size: 0.85rem; }
    </style>
</head>
<body style="background: #f5f6fa; min-height: 100vh;">
    <header class="main-header" id="top">
        <div class="logo-container">
            <a href="{{ url_for('home') }}">
                <img src="{{ url_for('static', filename='imagenes/logo.png') }}" alt="Viatges Carcaixent" class="logo-premium">
            </a>
        </div>
    </header>

    <div class="auth-container">
        <h1>Iniciar Sesión</h1>
        <p class="subtitle">Accede a tu área de cliente</p>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        {% if success %}
        <div class="alert alert-success">{{ success }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('clientes.login') }}">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="tu@email.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required placeholder="Tu contraseña" autocomplete="current-password">
            </div>
            <button type="submit" class="btn-auth">Iniciar Sesión</button>
        </form>

        <div class="auth-links">
            <a href="{{ url_for('clientes.recuperar_password') }}">¿Olvidaste tu contraseña?</a>
        </div>

        <div class="divider"><span>¿No tienes cuenta?</span></div>

        <div class="auth-links">
            <a href="{{ url_for('clientes.registro') }}">Crear cuenta gratis</a>
        </div>
    </div>
</body>
</html>
